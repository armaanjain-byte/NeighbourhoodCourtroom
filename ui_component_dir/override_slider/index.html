<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
    * { box-sizing: border-box; }
    body {
        font-family: 'Outfit', sans-serif;
        background-color: #F0F0F0;
        color: #121212;
        margin: 0;
        padding: 12px;
    }
    /* ── Bauhaus range slider ── */
    input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track {
        width: 100%; height: 8px;
        background: #E0E0E0;
        border-radius: 0;
        border: 2px solid #121212;
    }
    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        height: 24px; width: 24px;
        border-radius: 0;
        background: #553c9a;
        cursor: pointer;
        margin-top: -10px;
        border: 3px solid #121212;
        box-shadow: 3px 3px 0px 0px #121212;
    }
</style>
</head>
<body id="root-body">

<div style="background: #ffffff; padding: 1.5rem; border: 4px solid #121212; box-shadow: 6px 6px 0px 0px #121212; border-radius: 0; display: flex; flex-direction: column; gap: 1.5rem;">
    <div>
        <label id="lbl-param" style="display:block; font-family:Outfit,sans-serif; font-weight:900; font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase; color:#121212; margin-bottom:0.75rem; padding-bottom:0.4rem; border-bottom:3px solid #121212;">Parameter</label>
        <div style="position:relative; padding-top:1.5rem; padding-bottom:0.5rem;" id="slider-container">
            <div id="ticks-container"></div>
            <input class="cursor-pointer" id="inp-slider" type="range" min="0" max="100" value="50"/>
            <div style="display:flex; justify-content:space-between; margin-top:0.5rem;">
                <span id="lbl-min" style="font-family:Outfit,sans-serif; font-weight:900; font-size:0.7rem; color:#121212;">0</span>
                <span id="lbl-max" style="font-family:Outfit,sans-serif; font-weight:900; font-size:0.7rem; color:#121212;">100</span>
            </div>
        </div>
        <!-- Preview panel — Finance amber (primary-red Bauhaus role = "current position") -->
        <div style="background:#744210; padding:0.75rem 1rem; margin-top:1rem; border:3px solid #121212; box-shadow:3px 3px 0px 0px #121212;">
            <p id="lbl-preview" style="font-family:Outfit,sans-serif; font-weight:900; font-size:0.82rem; color:#fefcbf; text-align:center; letter-spacing:0.06em; text-transform:uppercase;">
                Siding with ...
            </p>
        </div>
    </div>
    <button id="btn-confirm" style="width:100%; background:#553c9a; color:#e9d8fd; border:4px solid #121212; border-radius:0; padding:1rem; font-family:Outfit,sans-serif; font-weight:900; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.1em; box-shadow:5px 5px 0px 0px #121212; cursor:pointer; transition:transform 0.1s ease-out,box-shadow 0.1s ease-out;"
        onmouseover="this.style.transform='translate(-2px,-2px)'; this.style.boxShadow='7px 7px 0px 0px #121212';"
        onmouseout="this.style.transform=''; this.style.boxShadow='5px 5px 0px 0px #121212';"
        onmousedown="this.style.transform='translate(4px,4px)'; this.style.boxShadow='none';"
        onmouseup="this.style.transform='translate(-2px,-2px)'; this.style.boxShadow='7px 7px 0px 0px #121212';">
        Confirm Final Ruling
    </button>
</div>

<script>
    function sendMessageToStreamlitClient(type, data) {
        var outData = Object.assign({
            isStreamlitMessage: true,
            type: type,
        }, data);
        window.parent.postMessage(outData, "*");
    }

    function init() {
        sendMessageToStreamlitClient("streamlit:componentReady", {apiVersion: 1});
    }

    let isInitialized = false;
    let currentArgs = {};

    window.addEventListener("message", function(event) {
        if (event.data.type === "streamlit:render") {
            currentArgs = event.data.args;
            if (!isInitialized) {
                document.getElementById('lbl-param').innerText = currentArgs.param_label;
                
                const slider = document.getElementById('inp-slider');
                slider.min = currentArgs.min_val;
                slider.max = currentArgs.max_val;
                if(currentArgs.step) slider.step = currentArgs.step;
                slider.value = currentArgs.current_val;

                document.getElementById('lbl-min').innerText = currentArgs.min_val;
                document.getElementById('lbl-max').innerText = currentArgs.max_val;

                const ticksContainer = document.getElementById('ticks-container');
                ticksContainer.innerHTML = '';
                currentArgs.agent_ticks.forEach(tick => {
                    const div = document.createElement('div');
                    div.className = 'absolute top-0 flex flex-col items-center';
                    div.style.position = 'absolute';
                    div.style.top = '0';
                    div.style.display = 'flex';
                    div.style.flexDirection = 'column';
                    div.style.alignItems = 'center';
                    div.style.left = `calc(${tick.pct}% - 16px)`;
                    div.style.width = '32px';

                    // Use agent identity colors for tick marks
                    let tickColor = '#121212';
                    if (tick.name === 'FIN') tickColor = '#744210';
                    else if (tick.name === 'CLI') tickColor = '#276749';
                    else if (tick.name === 'COM') tickColor = '#553c9a';

                    div.innerHTML = `
                        <span style="font-family:Outfit,sans-serif;font-weight:900;font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:${tickColor};">${tick.name}</span>
                        <div style="width:2px;height:8px;background:${tickColor};margin-top:2px;border:1px solid #121212;"></div>
                    `;
                    ticksContainer.appendChild(div);
                });
                
                updatePreview(slider.value);
                isInitialized = true;
            }
            
            setTimeout(() => {
                sendMessageToStreamlitClient("streamlit:setFrameHeight", {height: document.getElementById("root-body").scrollHeight + 20});
            }, 100);
        }
    });

    const slider = document.getElementById('inp-slider');
    slider.addEventListener('input', (e) => updatePreview(e.target.value));

    function updatePreview(val) {
        if(!currentArgs.agent_ticks) return;
        
        let closestAgent = null;
        let minDiff = Infinity;
        
        currentArgs.agent_ticks.forEach(tick => {
            const diff = Math.abs(val - tick.raw_val);
            if(diff < minDiff) {
                minDiff = diff;
                closestAgent = tick;
            }
        });
        
        const preview = document.getElementById('lbl-preview');
        if(closestAgent) {
            // Agent identity text colors on Finance amber background
            let agentColor = "#fefcbf"; // default Finance amber text
            let agentBg = "#744210";
            if(closestAgent.name === "FIN") { agentColor = "#fefcbf"; agentBg = "#744210"; }
            else if(closestAgent.name === "CLI") { agentColor = "#c6f6d5"; agentBg = "#276749"; }
            else if(closestAgent.name === "COM") { agentColor = "#e9d8fd"; agentBg = "#553c9a"; }
            
            // Update preview panel background to closest agent color
            preview.parentElement.style.background = agentBg;
            preview.innerHTML = `<span style="color:rgba(255,255,255,0.65);">SET TO</span> <span style="color:${agentColor};font-size:1.1rem;">${val}</span> — <span style="font-weight:900;color:${agentColor};">${closestAgent.full_name} (${closestAgent.value})</span>`;
        } else {
            preview.parentElement.style.background = '#744210';
            preview.innerHTML = `<span style="color:#fefcbf;">SET TO ${val}</span>`;
        }
    }

    document.getElementById('btn-confirm').addEventListener('click', () => {
        sendMessageToStreamlitClient("streamlit:setComponentValue", {value: parseFloat(slider.value)});
    });

    init();
</script>
</body>
</html>
