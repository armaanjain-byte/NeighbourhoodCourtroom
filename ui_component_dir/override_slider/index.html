<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
    body { font-family: 'Public Sans', sans-serif; background-color: #f9f9f9; margin: 0; padding: 12px; }
    input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #e2e2e2; border-radius: 2px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #111d23; cursor: pointer; margin-top: -8px; border: 2px solid #ffffff; box-shadow: 0 0 0 1px #111d23; }
</style>
</head>
<body id="root-body">
<div class="bg-white p-6 rounded-xl border border-gray-200 space-y-6 shadow-sm">
    <div>
        <label id="lbl-param" class="font-semibold text-[14px] text-gray-900 mb-2 block">Parameter</label>
        <div class="relative pt-6 pb-2" id="slider-container">
            <div id="ticks-container"></div>
            <input class="cursor-pointer" id="inp-slider" type="range" min="0" max="100" value="50"/>
            <div class="flex justify-between mt-2 text-xs text-gray-500 font-bold">
                <span id="lbl-min">0</span>
                <span id="lbl-max">100</span>
            </div>
        </div>
        <div class="bg-[#263238] p-3 rounded mt-4">
            <p id="lbl-preview" class="font-semibold text-[14px] text-[#8d9aa1] text-center">
                Siding with ...
            </p>
        </div>
    </div>
    <button id="btn-confirm" class="w-full bg-[#111d23] hover:bg-[#263238] text-white py-4 rounded font-semibold text-[14px] uppercase tracking-widest transition-colors">
        Confirm Final Ruling
    </button>
</div>

<script>
    function sendMessageToStreamlitClient(type, data) {
        var outData = Object.assign({
            isStreamlitMessage: true,
            type: type,
        }, data);
        window.parent.postMessage(outData, "*");
    }

    function init() {
        sendMessageToStreamlitClient("streamlit:componentReady", {apiVersion: 1});
    }

    let isInitialized = false;
    let currentArgs = {};

    window.addEventListener("message", function(event) {
        if (event.data.type === "streamlit:render") {
            currentArgs = event.data.args;
            if (!isInitialized) {
                document.getElementById('lbl-param').innerText = currentArgs.param_label;
                
                const slider = document.getElementById('inp-slider');
                slider.min = currentArgs.min_val;
                slider.max = currentArgs.max_val;
                if(currentArgs.step) slider.step = currentArgs.step;
                slider.value = currentArgs.current_val;

                document.getElementById('lbl-min').innerText = currentArgs.min_val;
                document.getElementById('lbl-max').innerText = currentArgs.max_val;

                const ticksContainer = document.getElementById('ticks-container');
                ticksContainer.innerHTML = '';
                currentArgs.agent_ticks.forEach(tick => {
                    const div = document.createElement('div');
                    div.className = 'absolute top-0 flex flex-col items-center';
                    div.style.left = `calc(${tick.pct}% - 15px)`;
                    div.style.width = '30px';
                    div.innerHTML = `
                        <span class="font-medium text-[10px] text-gray-500">${tick.name}</span>
                        <div class="w-px h-2 bg-gray-400 mt-1"></div>
                    `;
                    ticksContainer.appendChild(div);
                });
                
                updatePreview(slider.value);
                isInitialized = true;
            }
            
            setTimeout(() => {
                sendMessageToStreamlitClient("streamlit:setFrameHeight", {height: document.getElementById("root-body").scrollHeight + 20});
            }, 100);
        }
    });

    const slider = document.getElementById('inp-slider');
    slider.addEventListener('input', (e) => updatePreview(e.target.value));

    function updatePreview(val) {
        if(!currentArgs.agent_ticks) return;
        
        let closestAgent = null;
        let minDiff = Infinity;
        
        currentArgs.agent_ticks.forEach(tick => {
            const diff = Math.abs(val - tick.raw_val);
            if(diff < minDiff) {
                minDiff = diff;
                closestAgent = tick;
            }
        });
        
        const preview = document.getElementById('lbl-preview');
        if(closestAgent) {
            let color = "white";
            if(closestAgent.name === "FIN") color = "#fbbf24";
            else if(closestAgent.name === "CLI") color = "#4ade80";
            else if(closestAgent.name === "COM") color = "#c084fc";
            
            preview.innerHTML = `Set to <span style="color:${color}">${val}</span> — Closest to <span class="font-bold text-white">${closestAgent.full_name} (${closestAgent.value})</span>`;
        } else {
            preview.innerHTML = `Set to <span class="text-white">${val}</span>`;
        }
    }

    document.getElementById('btn-confirm').addEventListener('click', () => {
        sendMessageToStreamlitClient("streamlit:setComponentValue", {value: parseFloat(slider.value)});
    });

    init();
</script>
</body>
</html>
