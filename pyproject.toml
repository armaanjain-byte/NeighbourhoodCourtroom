[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --cov=."
testpaths = [
    "tests",
]
filterwarnings = [
    "ignore::DeprecationWarning:google.genai.*",
    "ignore::DeprecationWarning:pydantic.*",
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
